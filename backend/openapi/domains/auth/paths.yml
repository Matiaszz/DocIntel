register:
  post:
    summary: Register a new user
    tags:
      - Authentication
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yml#/RegisterRequest'
    responses:
      '201':
        description: User registered successfully
        content:
          application/json:
            schema:
              $ref: '../user/schemas.yml#/UserResponse'
      '400':
        description: Invalid input or user already exists

login:
  post:
    summary: Authenticate user and return token
    tags:
      - Authentication
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yml#/LoginRequest'
    responses:
      '200':
        description: Authentication successful. Sets a secure HttpOnly refreshToken cookie.
        headers:
          Set-Cookie:
            schema:
              type: string
              example: refreshToken=abc123xyz; Path=/; HttpOnly; Secure; SameSite=Strict
        content:
          application/json:
            schema:
              $ref: './schemas.yml#/LoginResponse'
      '401':
        description: Invalid credentials

refresh:
  post:
    summary: Refresh access token using HttpOnly cookie
    tags:
      - Authentication
    security: []
    parameters:
      - in: cookie
        name: refreshToken
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Token refreshed successfully
        content:
          application/json:
            schema:
              $ref: './schemas.yml#/TokenResponse'
      '401':
        description: Missing or invalid refresh token

logout:
  post:
    summary: Logout user and invalidate refresh token
    tags:
      - Authentication
    security: []
    parameters:
      - in: cookie
        name: refreshToken
        schema:
          type: string
    responses:
      '200':
        description: Logged out successfully. Clears the HttpOnly refreshToken cookie.

verify-email:
  post:
    summary: Verify user's email address
    tags:
      - Authentication
    security: []
    parameters:
      - in: query
        name: token
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Email verified successfully
      '400':
        description: Invalid or expired verification token

resend-verification:
  post:
    summary: Resend verification email
    tags:
      - Authentication
    security: []
    parameters:
      - in: query
        name: email
        required: true
        schema:
          type: string
          format: email
    responses:
      '200':
        description: Verification email resent successfully

forgot-password:
  post:
    summary: Initiate password reset flow
    tags:
      - Authentication
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yml#/ForgotPasswordRequest'
    responses:
      '200':
        description: Password reset email sent if user exists

reset-password:
  post:
    summary: Reset password using verification token
    tags:
      - Authentication
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: './schemas.yml#/ResetPasswordRequest'
    responses:
      '200':
        description: Password reset successfully
      '400':
        description: Invalid/expired token or validation failure
